name: Runtime

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    permissions:
      contents: write
    steps:
      - name: 1. Checkout latest code
        uses: actions/checkout@v5

      - name: 2. Prepare or update dependency environment
        run: |
          REQ_FILE="requirements-lock.txt"
          if [ ! -f "$REQ_FILE" ]; then REQ_FILE="requirements.txt"; fi
          PYTHON_BIN="python3"
          if command -v python3.11 >/dev/null 2>&1; then PYTHON_BIN="python3.11"; fi
          echo "Using interpreter: $PYTHON_BIN ($($PYTHON_BIN --version 2>&1))"

          # Create the virtual environment on first run, then reuse it when possible.
          if [ ! -d "venv" ]; then
            "$PYTHON_BIN" -m venv venv
            venv/bin/pip install -U pip
            venv/bin/pip install -r "$REQ_FILE"
            sha256sum "$REQ_FILE" | cut -d' ' -f1 > .venv_requirements_hash
          else
            CURR_HASH=$(sha256sum "$REQ_FILE" | cut -d' ' -f1)
            if [ -f ".venv_requirements_hash" ] && [ "$CURR_HASH" = "$(cat .venv_requirements_hash)" ]; then
              echo "$REQ_FILE unchanged; reusing the existing venv."
            else
              echo "$REQ_FILE changed; updating the dependency environment."
              venv/bin/pip install -U pip
              venv/bin/pip install -r "$REQ_FILE"
              echo "$CURR_HASH" > .venv_requirements_hash
            fi
          fi

      - name: 3. Run trading strategy
        run: |
          set -euo pipefail
          if [ -z "${GCP_SA_KEY:-}" ]; then
            echo "Missing GCP_SA_KEY secret." >&2
            exit 1
          fi
          CREDENTIALS_FILE="$(mktemp "${RUNNER_TEMP:-/tmp}/binancequant-gcp-key.XXXXXX.json")"
          cleanup() {
            rm -f "$CREDENTIALS_FILE"
          }
          trap cleanup EXIT
          umask 077
          printf '%s' "$GCP_SA_KEY" > "$CREDENTIALS_FILE"
          export GOOGLE_APPLICATION_CREDENTIALS="$CREDENTIALS_FILE"
          venv/bin/python main.py
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          GLOBAL_TELEGRAM_CHAT_ID: ${{ vars.GLOBAL_TELEGRAM_CHAT_ID }}
          NOTIFY_LANG: ${{ vars.NOTIFY_LANG }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: 4. Capture execution timestamp
        id: ts
        run: echo "ts=$(date -u +%Y-%m-%dT%H%M)" >> "$GITHUB_OUTPUT"

      - name: 5. Push execution log to logs branch
        continue-on-error: true
        run: |
          LOGS_BRANCH="logs"
          TS="${{ steps.ts.outputs.ts }}"
          MONTH="${TS:0:7}"
          REPORT_FILE="${GITHUB_WORKSPACE}/reports/execution_report.json"

          if [ ! -f "$REPORT_FILE" ]; then
            echo "No execution report found, skipping log push."
            exit 0
          fi

          TMP_DIR=$(mktemp -d)
          git clone --no-checkout "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "${TMP_DIR}/logs-repo"
          cd "${TMP_DIR}/logs-repo"

          if git ls-remote --exit-code --heads origin "${LOGS_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${LOGS_BRANCH}:${LOGS_BRANCH}"
            git checkout "${LOGS_BRANCH}"
          else
            git checkout --orphan "${LOGS_BRANCH}"
            git rm -rf . >/dev/null 2>&1 || true
            find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          fi

          mkdir -p "hourly/${MONTH}"
          cp "$REPORT_FILE" "hourly/${MONTH}/${TS}.json"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "hourly/${MONTH}/${TS}.json"
          git commit -m "execution: ${TS}"
          git push origin "HEAD:${LOGS_BRANCH}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
