name: Binance Quant

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'   # every hour at :00 UTC

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: 1. 拉取最新代码
        uses: actions/checkout@v3

      - name: 2. 准备/更新依赖环境（智能复用）
        run: |
          REQ_FILE="requirements-lock.txt"
          if [ ! -f "$REQ_FILE" ]; then REQ_FILE="requirements.txt"; fi
          PYTHON_BIN="python3"
          if command -v python3.11 >/dev/null 2>&1; then PYTHON_BIN="python3.11"; fi
          echo "Using interpreter: $PYTHON_BIN ($($PYTHON_BIN --version 2>&1))"

          # 如果还没有虚拟环境，先创建并完整安装一次
          if [ ! -d "venv" ]; then
            "$PYTHON_BIN" -m venv venv
            venv/bin/pip install -U pip
            venv/bin/pip install -r "$REQ_FILE"
            sha256sum "$REQ_FILE" | cut -d' ' -f1 > .venv_requirements_hash
          else
            CURR_HASH=$(sha256sum "$REQ_FILE" | cut -d' ' -f1)
            if [ -f ".venv_requirements_hash" ] && [ "$CURR_HASH" = "$(cat .venv_requirements_hash)" ]; then
              echo "$REQ_FILE 未变化，跳过依赖安装，直接复用 venv。"
            else
              echo "$REQ_FILE 有变化，更新依赖环境。"
              venv/bin/pip install -U pip
              venv/bin/pip install -r "$REQ_FILE"
              echo "$CURR_HASH" > .venv_requirements_hash
            fi
          fi

      - name: 3. 执行交易策略
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
        run: |
          set -euo pipefail
          if [ -z "${GCP_SA_KEY:-}" ]; then
            echo "Missing GCP_SA_KEY secret." >&2
            exit 1
          fi
          CREDENTIALS_FILE="$(mktemp "${RUNNER_TEMP:-/tmp}/binancequant-gcp-key.XXXXXX.json")"
          cleanup() {
            rm -f "$CREDENTIALS_FILE"
          }
          trap cleanup EXIT
          umask 077
          printf '%s' "$GCP_SA_KEY" > "$CREDENTIALS_FILE"
          export GOOGLE_APPLICATION_CREDENTIALS="$CREDENTIALS_FILE"
          venv/bin/python main.py
        env:
          BINANCE_API_KEY: ${{ secrets.BINANCE_API_KEY }}
          BINANCE_API_SECRET: ${{ secrets.BINANCE_API_SECRET }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
